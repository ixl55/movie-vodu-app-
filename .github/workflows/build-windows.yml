name: Build Windows App

on:
  push:
    branches: [main, master, windows-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install VS 2022 Build Tools (UWP + C++)
        run: |
          choco install visualstudio2022buildtools --package-parameters "--quiet --wait --norestart --add Microsoft.VisualStudio.Workload.Universal --add Microsoft.VisualStudio.Workload.NativeDesktop --includeRecommended" -y --limit-output
        shell: powershell

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows App with RNW
        run: npx --yes @react-native-community/cli run-windows --no-launch --release 2>&1
        shell: powershell

      - name: Find build output
        run: |
          Get-ChildItem -Recurse -Depth 5 -Path "windows" -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in '.msix','.msixbundle','.appx','.exe','.appxbundle' } | Select-Object FullName, Length
          if (-not $?) { 
            Write-Output "Checking windows folder structure..."
            Get-ChildItem -Recurse -Depth 2 -Path "windows" -ErrorAction SilentlyContinue | Select-Object FullName
          }
        shell: powershell
        continue-on-error: true

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: MovieVodu-Windows
          path: |
            windows/MovieVoduWin/AppPackages/**/*
            windows/MovieVoduWin/**/*.msix
            windows/MovieVoduWin/**/*.msixbundle
            windows/MovieVoduWin/**/*.appx
            windows/MovieVoduWin/**/*.exe
          if-no-files-found: warn
