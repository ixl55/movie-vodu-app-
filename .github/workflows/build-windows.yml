name: Build Windows App

on:
  push:
    branches: [main, master, windows-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure UWP and C++ workloads
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vsInstaller = Join-Path $vsPath "..\..\vs_installer.exe"
          
          # Check what workloads are installed
          $installed = & $vsInstaller modify --channelId VisualStudio.17.Release --productId Microsoft.VisualStudio.Product.Community --quiet --norestart --installWhileDownloading --list 2>&1
          Write-Output "--- Installed workloads ---"
          Write-Output $installed
          
          # Install UWP and C++ workloads if not present
          & $vsInstaller modify --channelId VisualStudio.17.Release --productId Microsoft.VisualStudio.Product.Community --quiet --norestart --installWhileDownloading --add Microsoft.VisualStudio.Workload.Universal --add Microsoft.VisualStudio.Workload.NativeDesktop --includeRecommended
        shell: powershell
        continue-on-error: true

      - name: Set up MSBuild env
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $devShell = Join-Path $vsPath "Common7\Tools\vsdevcmd\core\vsdevcmdcore.bat"
          $env:VSCMD_ARG_TGT_ARCH=x64
          
          # Restore NuGet
          cmd /c "`"$devShell`" && msbuild windows\MovieVoduWin.sln /t:Restore /p:RestorePackagesConfig=true"
          
          # Build solution
          cmd /c "`"$devShell`" && msbuild windows\MovieVoduWin.sln /p:Configuration=Release /p:Platform=x64 /p:AppxPackage=true"
        shell: powershell

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: MovieVodu-Windows
          path: windows/MovieVoduWin/AppPackages/**/*
          if-no-files-found: warn
