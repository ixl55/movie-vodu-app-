name: Build Windows App

on:
  push:
    branches: [main, master, windows-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RNW dependencies (VS components)
        run: |
          powershell -ExecutionPolicy Bypass -File node_modules\react-native-windows\scripts\rnw-dependencies.ps1
        shell: powershell

      - name: Install npm dependencies
        run: npm ci

      - name: Restore NuGet packages
        run: |
          cd windows
          nuget restore MovieVoduWin.sln
        shell: powershell

      - name: Build Windows App
        run: npx --yes react-native run-windows --no-launch --release --logging
        shell: powershell

      - name: Upload MSIX Bundle
        uses: actions/upload-artifact@v4
        with:
          name: MovieVodu-Windows
          path: windows/MovieVoduWin/AppPackages/**/*
          if-no-files-found: warn
