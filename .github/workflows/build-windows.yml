name: Build Windows App

on:
  push:
    branches: [main, master, windows-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Patch RNW CLI for VS 2026 support
        run: |
          $file = "node_modules\@react-native-windows\cli\lib-commonjs\utils\msbuildtools.js"
          if (Test-Path $file) {
            (Get-Content $file) -replace "'17.11.0'", "'18.0.0'" | Set-Content $file
            Write-Output "Patched vs version range to support VS 2026"
          } else {
            Write-Output "File not found, trying alternative path..."
            $file2 = "node_modules\@react-native-community\cli-platform-windows\lib-commonjs\utils\msbuildtools.js"
            if (Test-Path $file2) {
              (Get-Content $file2) -replace "'17.11.0'", "'18.0.0'" | Set-Content $file2
              Write-Output "Patched alternative path"
            } else {
              Write-Output "Searching for msbuildtools.js..."
              Get-ChildItem -Recurse -Filter "msbuildtools.js" -Path "node_modules" | Select-Object FullName
            }
          }
        shell: powershell

      - name: Build Windows App
        run: npx --yes @react-native-community/cli run-windows --no-launch --release --logging
        shell: powershell

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: MovieVodu-Windows
          path: windows/MovieVoduWin/AppPackages/**/*
          if-no-files-found: warn
