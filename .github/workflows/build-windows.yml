name: Build Windows App

on:
  push:
    branches: [main, master, windows-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install VS 2022 Build Tools (UWP + C++)
        run: |
          choco install visualstudio2022buildtools --package-parameters "--quiet --wait --norestart --add Microsoft.VisualStudio.Workload.Universal --add Microsoft.VisualStudio.Workload.NativeDesktop --includeRecommended --add Microsoft.VisualStudio.Component.Windows10SDK.20348" -y
          echo "VS installed, checking..."
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -version "[17.0,18.0)" -property installationPath
          echo "VS 2022 Path: $vsPath"
        shell: powershell
        continue-on-error: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows App
        run: npx --yes @react-native-community/cli run-windows --no-launch --release --logging
        shell: powershell

      - name: Upload App Package
        uses: actions/upload-artifact@v4
        with:
          name: MovieVodu-Windows
          path: windows/MovieVoduWin/AppPackages/**/*
          if-no-files-found: warn
